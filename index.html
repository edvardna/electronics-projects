<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watch Swipe Survey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- NAME SCREEN -->
    <div id="nameScreen" class="overlay">
      <div class="overlayCard">
        <h2>Vote on watch designs</h2>
        <p class="sub">Enter your name to start.</p>

        <input id="nameInput" class="input" type="text" placeholder="Your name" maxlength="40" />
        <button id="startBtn" class="btn">Start</button>

        <p id="dbStatus" class="status">Connecting…</p>
      </div>
    </div>

    <!-- TOP BAR -->
    <div class="topbar">
      <div id="counter" class="counter">1 / 20</div>
      <div id="left" class="left">19 left</div>
    </div>

    <!-- CARD -->
    <div id="card">
      <div id="nopeBadge" class="badge">NOPE</div>
      <div id="likeBadge" class="badge">LIKE</div>
      <img id="watchImage" src="" alt="Watch" />
    </div>

    <div class="hint">👈 Dislike &nbsp;&nbsp; | &nbsp;&nbsp; Like 👉</div>

    <!-- DONE SCREEN -->
    <div id="doneScreen" class="done hidden">
      <div class="doneCard">
        <h2>Done ✅</h2>
        <p>Thanks for voting!</p>

        <button id="retryBtn" class="btn">Retry</button>
        <button id="downloadBtn" class="btn btnSecondary">Download my votes (JSON)</button>
      </div>
    </div>

  </div>

  <!-- Firebase loader (ES module) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
    window.__firebase = { initializeApp, getFirestore };
  </script>

  <script type="module" src="./script.js"></script>
</body>
</html>
